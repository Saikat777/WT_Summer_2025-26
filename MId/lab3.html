<!DOCTYPE html>
<html>
<head>
    <title>Internship Form</title>
</head>
<body>

<h2>Internship Confirmation Form</h2>

<form>

    Student Name:<br>
    <input type="text" name="name" required>
    <br><br>

    Email Address:<br>
    <input type="email" name="email" required>
    <br><br>

    Preferred Internship Type:<br>
    <input type="radio" name="type" value="On-Site" required> On-Site
    <input type="radio" name="type" value="Remote"> Remote
    <br><br>

    Internship Duration:<br>
    <select name="duration">
        <option value="6 Weeks">6 Weeks</option>
        <option value="3 Months">3 Months</option>
    </select>
    <br><br>

    Skills of Interest:<br>
    <input type="checkbox" name="skills" value="Web Development"> Web Development<br>
    <input type="checkbox" name="skills" value="Data Analysis"> Data Analysis<br>
    <input type="checkbox" name="skills" value="Mobile Apps"> Mobile Apps<br>

    <br>

    <input type="submit" value="Submit">

</form>

</body>
</html>
